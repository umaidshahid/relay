services:
  proxy:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - relay-data:/data
    environment:
      - RELAY_DB_PATH=/data/relay.db
      # Optional: override the backend API key without editing config.yml
      # - BACKEND_API_KEY=sk-your-key-here
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: local Ollama instance
  # Start with: docker compose --profile ollama up
  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  relay-data:
  ollama-data:
