services:
  proxy:
    image: ghcr.io/umaidshahid/relay:latest
    ports:
      - "8000:8000"
    volumes:
      - relay-data:/data
    env_file:
      - .env
    environment:
      - RELAY_DB_PATH=/data/relay.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    depends_on:
      - proxy

volumes:
  relay-data:
  caddy-data:
  caddy-config: